name: personal_health_tracker
description: A personal health tracking Flutter application with Firebase backend.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1

  # State Management
  provider: ^6.1.1

  # Charts
  fl_chart: ^0.70.2

  # Local Notifications
  flutter_local_notifications: ^18.0.1

  # Timezone support for scheduled notifications
  timezone: ^0.10.0

  # Date formatting
  intl: ^0.19.0

  # Material icons
  cupertino_icons: ^1.0.6

  # Google Fonts (Poppins)
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
